services:
  - type: web
    plan: free
    runtime: image
    name: n8n-service
    image:
      url: docker.io/n8nio/n8n:latest

    envVars:
      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      - key: DB_TYPE
        value: postgresdb

      # Credenciales seguras (se mantienen en el panel de Render)
      - key: DB_POSTGRESDB_DATABASE
        sync: false
      - key: DB_POSTGRESDB_HOST
        sync: false
      - key: DB_POSTGRESDB_PORT
        sync: false
      - key: DB_POSTGRESDB_USER
        sync: false
      - key: DB_POSTGRESDB_PASSWORD
        sync: false
        
      # Configuración SSL para Aiven
      - key: DB_POSTGRESDB_SSL_ENABLED
        value: "true"
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false"

      # --- AJUSTES DE ESTABILIDAD PARA CAPA GRATUITA ---
      
      # Limita el consumo de RAM de Node.js antes del límite de 512MB de Render
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
        
      # Evita problemas de enrutamiento y caídas al usar la interfaz o webhooks
      - key: WEBHOOK_URL
        value: "https://n8n-service-ggkw.onrender.com"
      
      # --- AJUSTES DE TIMEOUT PARA CPU LIMITADA ---
      
      # Aumenta el tiempo de validez del token a 120 segundos para permitir un arranque lento
      - key: N8N_RUNNERS_GRANT_TOKEN_TTL
        value: "120"
        
      # Limita las conexiones simultáneas para no saturar el límite de 20 de Aiven
      - key: DB_POSTGRESDB_POOL_SIZE
        value: "5"
